<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C Playground — tcaoanhvo</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"/>

  <!-- CodeMirror 5 -->
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/runmode/runmode.min.js"></script>
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css"/>

  <style>
    /* ── Reset & Variables ─────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:        #ffffff;
      --gray-50:      #f5f5f7;
      --gray-100:     #e8e8ed;
      --gray-200:     #d2d2d7;
      --gray-400:     #86868b;
      --gray-600:     #515154;
      --gray-900:     #1d1d1f;

      --blue:         #0071e3;
      --blue-hover:   #0077ed;
      --blue-light:   #e8f0fb;
      --green:        #1d9e1d;
      --green-light:  #e6f6e6;
      --orange:       #d4580a;
      --orange-light: #fef3e8;
      --red:          #c0392b;
      --red-light:    #fde8e8;
      --purple:       #7c3aed;
      --purple-light: #ede9fe;

      --font-sans:    'DM Sans', -apple-system, sans-serif;
      --font-mono:    'JetBrains Mono', 'SF Mono', Menlo, monospace;

      --nav-h:        60px;
      --radius:       12px;
      --radius-sm:    8px;
      --shadow-sm:    0 1px 4px rgba(0,0,0,.08);
      --shadow-md:    0 4px 20px rgba(0,0,0,.10);
      --transition:   all .2s ease;

      /* Editor layout */
      --editor-h:     calc(100vh - var(--nav-h) - 56px - 48px);
      --panel-gap:    12px;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--gray-50);
      color: var(--gray-900);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ───────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(255,255,255,.88);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--gray-100);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 0;
    }
    .nav__logo {
      font-size: 17px; font-weight: 600;
      color: var(--gray-900); text-decoration: none;
      letter-spacing: -.3px; white-space: nowrap;
    }
    .nav__logo span { color: var(--blue); }

    .nav__divider {
      width: 1px; height: 20px;
      background: var(--gray-200);
      margin: 0 14px;
    }

    .nav__title {
      font-size: 15px; font-weight: 500;
      color: var(--gray-600);
      display: flex; align-items: center; gap: 7px;
    }
    .nav__badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 99px;
      background: var(--blue-light); color: var(--blue);
      letter-spacing: .02em;
    }

    .nav__spacer { flex: 1; }

    .nav__links {
      display: flex; align-items: center;
      gap: 4px; list-style: none;
    }
    .nav__links a {
      color: var(--gray-600); font-size: 13.5px;
      padding: 6px 12px; border-radius: 8px;
      text-decoration: none; transition: var(--transition);
    }
    .nav__links a:hover { color: var(--gray-900); background: var(--gray-50); }

    /* ── Toolbar ────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      margin-top: var(--nav-h);
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      flex-wrap: wrap;
    }

    .toolbar__group {
      display: flex; align-items: center; gap: 6px;
    }
    .toolbar__sep {
      width: 1px; height: 22px;
      background: var(--gray-100); margin: 0 4px;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 15px; border-radius: 8px;
      font-family: var(--font-sans); font-size: 13.5px; font-weight: 500;
      cursor: pointer; transition: var(--transition); border: none;
      white-space: nowrap;
    }
    .btn--run {
      background: #22c55e; color: #fff;
      padding: 8px 20px; font-size: 14px;
      box-shadow: 0 2px 8px rgba(34,197,94,.3);
    }
    .btn--run:hover   { background: #16a34a; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(34,197,94,.35); }
    .btn--run:active  { transform: translateY(0); }
    .btn--run:disabled{ background: var(--gray-200); color: var(--gray-400); box-shadow: none; cursor: not-allowed; transform: none; }

    .btn--ghost {
      background: var(--white); color: var(--gray-600);
      border: 1px solid var(--gray-200);
    }
    .btn--ghost:hover { background: var(--gray-50); color: var(--gray-900); }

    .btn--danger {
      background: var(--white); color: var(--red);
      border: 1px solid var(--gray-200);
    }
    .btn--danger:hover { background: var(--red-light); border-color: var(--red); }

    .snippet-select {
      font-family: var(--font-sans); font-size: 13px;
      border: 1px solid var(--gray-200); border-radius: 8px;
      background: var(--white); color: var(--gray-900);
      padding: 7px 12px; cursor: pointer; outline: none;
      transition: var(--transition);
    }
    .snippet-select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,113,227,.1); }

    .toolbar__info {
      margin-left: auto;
      font-size: 12px; color: var(--gray-400);
      display: flex; align-items: center; gap: 12px;
    }
    .toolbar__shortcut {
      display: flex; align-items: center; gap: 4px;
    }
    kbd {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 500;
      padding: 2px 6px; border-radius: 5px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      color: var(--gray-600);
    }

    /* ── Main Layout ─────────────────────────────── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: 1fr auto;
      gap: var(--panel-gap);
      padding: var(--panel-gap) 16px 16px;
      height: calc(100vh - var(--nav-h) - 56px);
    }

    /* ── Editor Panel — VSCode Light ─────────────── */
    .editor-panel {
      background: #ffffff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    .panel-header--dark  { background: #f3f3f3; }
    .panel-header--light { background: var(--white); border-color: var(--gray-100); }

    .panel-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500;
    }
    .panel-title--dark  { color: #444; }
    .panel-title--light { color: var(--gray-600); }

    .dots { display: flex; gap: 5px; }
    .dot  { width: 11px; height: 11px; border-radius: 50%; }
    .dot:nth-child(1) { background: #ff5f57; }
    .dot:nth-child(2) { background: #ffbd2e; }
    .dot:nth-child(3) { background: #28c840; }

    .file-tag {
      font-size: 11px; font-weight: 500;
      padding: 2px 8px; border-radius: 5px;
      background: #e8e8ed; color: #0078d4;
      font-family: var(--font-mono);
    }

    .editor-actions { display: flex; align-items: center; gap: 6px; }
    .editor-btn {
      background: none; border: none;
      color: var(--gray-400); font-size: 12px;
      padding: 3px 8px; border-radius: 5px;
      cursor: pointer; font-family: var(--font-sans);
      transition: var(--transition);
    }
    .editor-btn:hover { background: var(--gray-100); color: var(--gray-900); }

    /* ── VSCode Light+ syntax theme ─────────────── */
    .cm-s-vscode-light.CodeMirror          { background: #fff; color: #1e1e1e; }
    .cm-s-vscode-light .CodeMirror-gutters { background: #f3f3f3; border-right: 1px solid #e0e0e0; }
    .cm-s-vscode-light .CodeMirror-linenumber   { color: #237893; padding: 0 10px 0 8px; }
    .cm-s-vscode-light .CodeMirror-cursor        { border-left: 2px solid #000; }
    .cm-s-vscode-light .CodeMirror-selected      { background: #add6ff; }
    .cm-s-vscode-light .CodeMirror-focused .CodeMirror-selected { background: #add6ff; }
    .cm-s-vscode-light .CodeMirror-activeline-background { background: #f0f0f0; }
    .cm-s-vscode-light .CodeMirror-matchingbracket {
      background: #d6d6d6; color: #1e1e1e !important;
      outline: 1px solid #999;
    }
    /* Tokens */
    .cm-s-vscode-light .cm-keyword    { color: #0000ff; }
    .cm-s-vscode-light .cm-atom       { color: #0000ff; }
    .cm-s-vscode-light .cm-type       { color: #0000ff; }
    .cm-s-vscode-light .cm-builtin    { color: #0000ff; }
    .cm-s-vscode-light .cm-def        { color: #795e26; }
    .cm-s-vscode-light .cm-variable   { color: #001080; }
    .cm-s-vscode-light .cm-variable-2 { color: #001080; }
    .cm-s-vscode-light .cm-property   { color: #001080; }
    .cm-s-vscode-light .cm-string     { color: #a31515; }
    .cm-s-vscode-light .cm-string-2   { color: #a31515; }
    .cm-s-vscode-light .cm-number     { color: #098658; }
    .cm-s-vscode-light .cm-comment    { color: #008000; font-style: italic; }
    .cm-s-vscode-light .cm-meta       { color: #af00db; }
    .cm-s-vscode-light .cm-operator   { color: #1e1e1e; }
    .cm-s-vscode-light .cm-bracket    { color: #1e1e1e; }
    .cm-s-vscode-light .cm-header     { color: #a31515; }
    .cm-s-vscode-light .cm-error      { color: #cd3131; text-decoration: underline wavy #cd3131; }

    /* ── CodeMirror base ────────────────────────── */
    .CodeMirror {
      height: 100% !important;
      font-family: var(--font-mono) !important;
      font-size: 14px !important;
      line-height: 1.7 !important;
      flex: 1;
    }
    .CodeMirror-scroll { padding-bottom: 12px; }
    .cm-editor-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

    /* ── stdin panel — light ────────────────────── */
    .stdin-panel {
      border-top: 1px solid var(--gray-100);
      background: #fafafa;
    }
    .stdin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px;
      border-bottom: 1px solid var(--gray-100);
    }
    .stdin-label { font-size: 12px; color: var(--gray-400); font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .stdin-textarea {
      width: 100%; background: #ffffff;
      border: none; outline: none; resize: vertical;
      color: #1e1e1e; font-family: var(--font-mono);
      font-size: 13px; padding: 10px 14px;
      line-height: 1.6; display: block;
      min-height: 72px; max-height: 160px;
    }
    .stdin-textarea:focus { background: #fefefe; }
    .stdin-textarea::placeholder { color: #bbb; }

    /* ── Output Panel ─────────────────────────────── */
    .output-panel {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-100);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .output-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      min-height: 0;
    }

    .output-placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 10px;
      color: var(--gray-400);
    }
    .output-placeholder-icon { font-size: 36px; }
    .output-placeholder-text { font-size: 14px; }
    .output-placeholder-hint { font-size: 12px; color: var(--gray-200); }

    /* Output states */
    .output-stdout {
      font-family: var(--font-mono);
      font-size: 13.5px; line-height: 1.8;
      color: var(--gray-900);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .output-stderr {
      font-family: var(--font-mono);
      font-size: 13px; line-height: 1.7;
      color: var(--red);
      white-space: pre-wrap;
      word-break: break-all;
      background: var(--red-light);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      border-left: 3px solid var(--red);
    }
    .output-section { margin-bottom: 14px; }
    .output-section-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--gray-400); margin-bottom: 6px;
    }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center;
      padding: 8px 14px; gap: 14px;
      border-top: 1px solid var(--gray-100);
      background: var(--gray-50);
      flex-wrap: wrap;
    }
    .status-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500;
      padding: 3px 10px; border-radius: 99px;
    }
    .status-chip--success { background: var(--green-light); color: var(--green); }
    .status-chip--error   { background: var(--red-light);   color: var(--red); }
    .status-chip--running { background: var(--blue-light);  color: var(--blue); }
    .status-chip--idle    { background: var(--gray-100);    color: var(--gray-400); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-dot--success { background: var(--green); }
    .status-dot--error   { background: var(--red); }
    .status-dot--running {
      background: var(--blue);
      animation: pulse 1s infinite;
    }
    .status-dot--idle    { background: var(--gray-400); }

    .status-meta {
      font-size: 12px; color: var(--gray-400);
      display: flex; align-items: center; gap: 3px;
    }
    .status-meta span { font-weight: 500; color: var(--gray-600); }

    /* ── Loader animation ───────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--blue-light);
      border-top-color: var(--blue);
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    /* ── Error line highlight ───────────────────── */
    .error-line-gutter { background: rgba(192,57,43,.2); }
    .error-line-bg     { background: rgba(192,57,43,.08); }

    /* ── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 55vh 1fr; }
      .toolbar__info { display: none; }
    }

    /* ── Toast ──────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--gray-900); color: #fff;
      font-size: 13px; font-weight: 500;
      padding: 10px 20px; border-radius: 99px;
      box-shadow: var(--shadow-md);
      z-index: 9999;
      animation: toastIn .25s ease;
      white-space: nowrap;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    /* ── Export dropdown menu ───────────────────── */
    .export-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      z-index: 200;
      min-width: 210px;
      overflow: hidden;
    }
    .export-menu.open { display: block; }
    .export-item {
      display: block; width: 100%;
      text-align: left; padding: 9px 16px;
      font-family: var(--font-sans); font-size: 13.5px;
      color: var(--gray-900); background: none; border: none;
      cursor: pointer; transition: background .15s;
    }
    .export-item:hover { background: var(--gray-50); }

    /* ── Theme transition ───────────────────────── */
    body, .editor-panel, .toolbar, .nav,
    .output-panel, .stdin-panel, .status-bar,
    .panel-header, .stdin-textarea { transition: background .25s, color .2s, border-color .2s; }

    /* ── VSCode Dark+ theme ─────────────────────── */
    body.dark-mode {
      background: #1e1e1e;
      color: #d4d4d4;
    }
    body.dark-mode .nav {
      background: rgba(30,30,30,.92);
      border-color: #3c3c3c;
    }
    body.dark-mode .nav__logo        { color: #d4d4d4; }
    body.dark-mode .nav__links a     { color: #9d9d9d; }
    body.dark-mode .nav__links a:hover{ color: #fff; background: #2a2d2e; }
    body.dark-mode .nav__title       { color: #9d9d9d; }
    body.dark-mode .nav__divider     { background: #3c3c3c; }

    body.dark-mode .toolbar {
      background: #252526;
      border-color: #3c3c3c;
    }
    body.dark-mode .btn--ghost {
      background: #2d2d2d; color: #cccccc;
      border-color: #3c3c3c;
    }
    body.dark-mode .btn--ghost:hover { background: #3e3e3e; color: #fff; }
    body.dark-mode .btn--danger { background: #2d2d2d; border-color: #3c3c3c; color: #f48771; }
    body.dark-mode .btn--danger:hover { background: #3e2020; }
    body.dark-mode .snippet-select {
      background: #2d2d2d; color: #cccccc;
      border-color: #3c3c3c;
    }
    body.dark-mode kbd {
      background: #2d2d2d; border-color: #555;
      color: #aaa;
    }
    body.dark-mode .toolbar__sep { background: #3c3c3c; }

    /* Editor panel dark */
    body.dark-mode .editor-panel {
      background: #1e1e1e;
      border-color: #3c3c3c;
    }
    body.dark-mode .panel-header--dark {
      background: #252526;
      border-color: #3c3c3c;
    }
    body.dark-mode .panel-title--dark  { color: #cccccc; }
    body.dark-mode .file-tag  { background: #2d2d2d; color: #4ec9b0; }
    body.dark-mode .editor-btn{ color: #858585; }
    body.dark-mode .editor-btn:hover { background: #2a2d2e; color: #fff; }
    body.dark-mode #lineInfo  { color: #858585 !important; }

    /* stdin dark */
    body.dark-mode .stdin-panel  { background: #252526; border-color: #3c3c3c; }
    body.dark-mode .stdin-header { border-color: #3c3c3c; }
    body.dark-mode .stdin-label  { color: #858585; }
    body.dark-mode .stdin-textarea {
      background: #1e1e1e; color: #d4d4d4;
    }
    body.dark-mode .stdin-textarea::placeholder { color: #555; }
    body.dark-mode .stdin-textarea:focus { background: #1a1a1a; }

    /* Output panel dark */
    body.dark-mode .output-panel {
      background: #1e1e1e;
      border-color: #3c3c3c;
    }
    body.dark-mode .panel-header--light {
      background: #252526;
      border-color: #3c3c3c;
    }
    body.dark-mode .panel-title--light { color: #858585; }
    body.dark-mode .output-stdout      { color: #d4d4d4; }
    body.dark-mode .output-placeholder-text { color: #555; }
    body.dark-mode .output-placeholder-hint { color: #3c3c3c; }
    body.dark-mode .output-section-label    { color: #555; }
    body.dark-mode .status-bar  { background: #252526; border-color: #3c3c3c; }
    body.dark-mode .status-meta { color: #555; }
    body.dark-mode .status-meta span { color: #858585; }
    body.dark-mode .status-chip--idle { background: #2d2d2d; color: #858585; }
    body.dark-mode .btn--ghost[id="btnClearOutput"] {
      background: #2d2d2d; border-color: #3c3c3c; color: #858585;
    }
    body.dark-mode .export-menu {
      background: #252526; border-color: #3c3c3c;
    }
    body.dark-mode .export-item { color: #cccccc; }

    /* CodeMirror Dark — VSCode Dark+ exact colors */

void bubbleSort(int a[], int n) {
    for (int i = 0; i < n - 1; i++) {
        bool swapped = false;
        for (int j = 0; j < n - 1 - i; j++) {
            if (a[j] > a[j+1]) {
                int t = a[j]; a[j] = a[j+1]; a[j+1] = t;
                swapped = true;
            }
        }
        if (!swapped) break;
    }
}

int main() {

}`,

void selectionSort(int a[], int n) {
    for (int i = 0; i < n - 1; i++) {

        for (int j = i + 1; j < n; j++)
            if (a[j] < a[minIdx]) minIdx = j;

  quick: `#include <stdio.h>

void swap(int *a, int *b) { int t=*a; *a=*b; *b=t; }

int partition(int a[], int lo, int hi) {
    int pivot = a[hi], i = lo - 1;
    for (int j = lo; j < hi; j++)
        if (a[j] <= pivot) { i++; swap(&a[i], &a[j]); }
    swap(&a[i+1], &a[hi]);
    return i + 1;
}

void quickSort(int a[], int lo, int hi) {
    if (lo < hi) {
        int p = partition(a, lo, hi);
        quickSort(a, lo, p - 1);
        quickSort(a, p + 1, hi);
    }
}

int main() {

int binarySearch(int a[], int n, int target) {
    int lo = 0, hi = n - 1;
    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2;
        if      (a[mid] == target) return mid;
        else if (a[mid] <  target) lo = mid + 1;
        else                        hi = mid - 1;
    }
    return -1;
}

#include <stdlib.h>

typedef struct Node {
    int data;
    struct Node *next;
} Node;

Node* newNode(int val) {
    Node *n = malloc(sizeof(Node));
    n->data = val; n->next = NULL;

void push(Node **head, int val) {

/* ════════════════════════════════════════════════
   RUN CODE via Piston API
════════════════════════════════════════════════ */
let running = false;

async function runCode() {
  if (running) return;
  running = true;

  const code  = cm.getValue().trim();
  const stdin = document.getElementById('stdinInput').value;

  if (!code) { showToast('⚠️ Editor trống!'); running = false; return; }

  const btnRun = document.getElementById('btnRun');
  btnRun.disabled = true;
  btnRun.innerHTML = '<div class="spinner"></div> Đang chạy...';
  setStatus('running', 'Đang biên dịch...');
  clearOutput();
  document.getElementById('metaTime').style.display = 'none';

  const t0 = performance.now();

  try {
    /* ── Wandbox API — free, no auth required ── */
    const res = await fetch('https://wandbox.org/api/compile.json', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        compiler:              'gcc-head-c',
        code:                  code,
        stdin:                 stdin,
        'compiler-option-raw': '-std=c11\n-lm\n-Wall',
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data    = await res.json();
    const elapsed = Math.round(performance.now() - t0);

    renderOutputWandbox(data, elapsed);

  } catch (err) {
    renderNetworkError(err);
  } finally {
    running = false;
    btnRun.disabled = false;
    btnRun.innerHTML = '<svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M3 2l9 4.5L3 11V2z"/></svg> Chạy';
  }
}

/* ════════════════════════════════════════════════
   OUTPUT HELPERS
════════════════════════════════════════════════ */
function clearOutput() {
  document.getElementById('outputBody').innerHTML =
    '<div class="output-placeholder" style="opacity:.4"><div class="spinner"></div></div>';
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

/* ════════════════════════════════════════════════
   WANDBOX OUTPUT RENDERER
   Response fields:
     status        — "0" = success, else exit code
     compiler_error — compile errors (string)
     program_output — stdout + stderr merged
     program_message — extra info
════════════════════════════════════════════════ */
function renderOutputWandbox(data, elapsed) {
  const body = document.getElementById('outputBody');
  body.innerHTML = '';

  /* ── Compile error ── */
  if (data.compiler_error && data.compiler_error.trim()) {
    const sec = document.createElement('div');
    sec.className = 'output-section';
    sec.innerHTML = `
      <div class="output-section-label" style="color:var(--red)">⛔ Lỗi biên dịch (Compile Error)</div>
      <div class="output-stderr">${escapeHtml(data.compiler_error.trim())}</div>`;
    body.appendChild(sec);
    highlightErrors(data.compiler_error);
    setStatus('error', 'Compile error');
    document.getElementById('metaTime').style.display = 'flex';
    document.getElementById('execTime').textContent = elapsed;
    return;
  }

  /* ── Compiler warnings (non-fatal) ── */
  if (data.compiler_message && data.compiler_message.trim()) {
    const sec = document.createElement('div');
    sec.className = 'output-section';
    sec.innerHTML = `
      <div class="output-section-label" style="color:var(--orange)">⚠ Compiler Warning</div>
      <div class="output-stderr" style="border-color:var(--orange);background:var(--orange-light);color:var(--orange)">${escapeHtml(data.compiler_message.trim())}</div>`;
    body.appendChild(sec);
  }

  /* ── Program output ── */
  const output = data.program_output ?? '';
  if (output.trim()) {
    const sec = document.createElement('div');
    sec.className = 'output-section';
    sec.innerHTML = `
      <div class="output-section-label">stdout</div>
      <div class="output-stdout">${escapeHtml(output)}</div>`;
    body.appendChild(sec);
  } else {
    body.innerHTML += `<div class="output-section">
      <div class="output-section-label">stdout</div>
      <div style="color:var(--gray-400);font-size:13px;font-style:italic">
        (Không có output — chương trình chạy thành công nhưng không in gì)
      </div>
    </div>`;
  }

  /* ── Exit / signal ── */
  const exitCode = parseInt(data.status ?? '0');
  const signal   = data.signal;
  if (signal) {
    const sec = document.createElement('div');
    sec.className = 'output-section';
    sec.innerHTML = `<div style="font-size:12px;color:var(--red);font-family:var(--font-mono)">
      Signal: ${escapeHtml(signal)} — chương trình bị kill (vòng lặp vô hạn hoặc vượt giới hạn thời gian)
    </div>`;
    body.appendChild(sec);
    setStatus('error', `Killed · ${signal}`);
  } else if (exitCode !== 0) {
    const sec = document.createElement('div');
    sec.className = 'output-section';
    sec.innerHTML = `<div style="font-size:12px;color:var(--orange);font-family:var(--font-mono)">Exit code: ${exitCode}</div>`;
    body.appendChild(sec);
    setStatus('error', `Exit code ${exitCode} · ${elapsed}ms`);
  } else {
    setStatus('success', `Thành công · ${elapsed}ms`);
  }

  document.getElementById('metaTime').style.display = 'flex';
  document.getElementById('execTime').textContent = elapsed;
}

function renderNetworkError(err) {
  document.getElementById('outputBody').innerHTML = `
    <div class="output-section">
      <div class="output-section-label" style="color:var(--red)">⛔ Lỗi kết nối</div>
      <div class="output-stderr">Không thể kết nối đến compiler server.
Kiểm tra kết nối mạng và thử lại.

Chi tiết: ${escapeHtml(err.message)}</div>
    </div>
    <div style="margin-top:14px;font-size:13px;color:var(--gray-400)">
      Compiler: <a href="https://wandbox.org" target="_blank" style="color:var(--blue)">Wandbox (GCC · C11)</a>
    </div>`;
  setStatus('error', 'Lỗi kết nối');
}

/* ════════════════════════════════════════════════
   ERROR LINE HIGHLIGHT
════════════════════════════════════════════════ */
const errorMarkers = [];

function highlightErrors(stderr) {
  errorMarkers.forEach(m => m.clear());
  errorMarkers.length = 0;

  // Parse GCC error format: file:line:col: error: msg
  const re = /main\.c:(\d+):\d+:/g;
  let match;
  while ((match = re.exec(stderr)) !== null) {
    const line = parseInt(match[1]) - 1;
    if (line >= 0 && line < cm.lineCount()) {
      errorMarkers.push(cm.addLineClass(line, 'background', 'error-line-bg'));
      errorMarkers.push(cm.addLineClass(line, 'gutter',     'error-line-gutter'));
    }
  }
}

/* ════════════════════════════════════════════════
   STATUS BAR
════════════════════════════════════════════════ */
function setStatus(type, text) {
  const chip = document.getElementById('statusChip');
  if (!chip) return;
  chip.className = `status-chip status-chip--${type}`;
  if (type === 'running') {
    chip.innerHTML = `<div class="spinner" style="width:10px;height:10px;border-width:1.5px;flex-shrink:0"></div><span style="margin-left:6px">${text}</span>`;
  } else {
    chip.innerHTML = `<div class="status-dot status-dot--${type}"></div><span style="margin-left:5px">${text}</span>`;
  }
}

function downloadFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function getFilename(ext) {
  // Try to extract function name from code for a smart filename
  const code = cm.getValue();
  const match = code.match(/\/\/\s*(.+)|filename[:\s]+(\S+)/i);
  return `main.${ext}`;
}

    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    highlighted += cls ? `<span class="cm-${cls}">${escaped}</span>` : escaped;

  // token colors for current theme

    keyword:'#569cd6', def:'#dcdcaa', variable:'#9cdcfe',
    string:'#ce9178', number:'#b5cea8', comment:'#6a9955',

    string:'#a31515', number:'#098658', comment:'#008000',
    meta:'#af00db', error:'#cd3131', operator:'#1e1e1e',
  };

  // Build lines with line numbers
  const lines = highlighted.split('\n');
  const linesHtml = lines.map((line, i) =>
    `<div class="line"><span class="ln">${i+1}</span><span class="lc">${line || ' '}</span></div>`
  ).join('');

  const html = `<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<title>main.c — tcaoanhvo</title>
<style>
  body { margin:0; background:${bg}; color:${fg}; font-family:'JetBrains Mono','Fira Code',Menlo,monospace; font-size:14px; line-height:1.7; }
  .header { padding:14px 20px; background:${isDark?'#252526':'#f3f3f3'}; border-bottom:1px solid ${gutBdr}; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:14px; color:${isDark?'#4ec9b0':'#0078d4'}; font-weight:600; margin:0; }

  .code { padding:16px 0; overflow-x:auto; }
  .line { display:flex; min-width:max-content; }
  .line:hover { background:${lineBg}; }
  .ln { display:inline-block; min-width:44px; padding:0 12px 0 8px; color:${gutClr}; background:${gut}; border-right:1px solid ${gutBdr}; text-align:right; user-select:none; flex-shrink:0; }
  .lc { padding:0 20px; white-space:pre; }
  .cm-keyword,.cm-atom,.cm-type,.cm-builtin { color:${T.keyword}; }
  .cm-def    { color:${T.def}; }
  .cm-variable,.cm-variable-2,.cm-property { color:${T.variable}; }
  .cm-string,.cm-string-2,.cm-header { color:${T.string}; }
  .cm-number { color:${T.number}; }
  .cm-comment { color:${T.comment}; font-style:italic; }
  .cm-meta   { color:${T.meta}; }
  .cm-operator,.cm-bracket { color:${T.operator}; }
  .cm-error  { color:${T.error}; }
</style>
</head>
<body>
<div class="header">
  <h1>📄 main.c</h1>
  <small>Xuất từ tcaoanhvo C Playground · ${new Date().toLocaleDateString('vi-VN')}</small>
</div>

  downloadFile(html, 'main.html', 'text/html');

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
function showToast(msg, duration = 2200) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), duration);
}
